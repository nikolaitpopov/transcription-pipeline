version: "3.9"

services:
  bot:
    build: .
    command: python -m src.bot.main
    env_file: .env
    volumes:
      - data:/var/data
    restart: unless-stopped

  transcriber:
    build: .
    command: python -m src.workers.transcriber
    env_file: .env
    volumes:
      - data:/var/data
      - model_cache:/root/.cache
    restart: unless-stopped

  diarizer:
    build: .
    command: python -m src.workers.diarizer
    env_file: .env
    volumes:
      - data:/var/data
      - model_cache:/root/.cache
    restart: unless-stopped

  sender:
    build: .
    command: python -m src.workers.sender
    env_file: .env
    volumes:
      - data:/var/data
    restart: unless-stopped

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/data
  model_cache:
